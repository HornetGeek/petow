version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgis/postgis:13-3.4
    container_name: petmatch_db
    environment:
      POSTGRES_DB: petmatch
      POSTGRES_USER: petmatch_user
      POSTGRES_PASSWORD: petmatch_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - petmatch_network
    restart: unless-stopped

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: petmatch_redis
    ports:
      - "6379:6379"
    networks:
      - petmatch_network
    restart: unless-stopped

  # Django Backend
  backend:
    build:
      context: ./patmatch
      dockerfile: Dockerfile
    container_name: petmatch_backend
    environment:
      - DEBUG=False
      - SECRET_KEY=your-secret-key-here
      - DATABASE_URL=postgresql://petmatch_user:petmatch_password@db:5432/petmatch
      - REDIS_URL=redis://redis:6379
      - NOTIFICATIONS_DELIVERY_MODE=${NOTIFICATIONS_DELIVERY_MODE:-async}
      - NOTIFICATION_EXPERIMENT_PHASE=${NOTIFICATION_EXPERIMENT_PHASE:-10}
      - NOTIFICATION_PUSH_BATCH_SIZE=${NOTIFICATION_PUSH_BATCH_SIZE:-500}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - CELERY_NOTIFICATION_QUEUE=${CELERY_NOTIFICATION_QUEUE:-notifications}
      - CELERY_NOTIFICATION_MAX_ATTEMPTS=${CELERY_NOTIFICATION_MAX_ATTEMPTS:-8}
      - CELERY_NOTIFICATION_RETRY_BASE_SECONDS=${CELERY_NOTIFICATION_RETRY_BASE_SECONDS:-5}
      - CELERY_NOTIFICATION_RETRY_MAX_SECONDS=${CELERY_NOTIFICATION_RETRY_MAX_SECONDS:-900}
      - GOOGLE_MAPS_SERVER_API_KEY=${GOOGLE_MAPS_SERVER_API_KEY:-}
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,petow.app,www.petow.app,api.petow.app
      - CORS_ALLOWED_ORIGINS=https://petow.app,https://www.petow.app,https://api.petow.app
      - USE_HETZNER_OBJECT_STORAGE=${USE_HETZNER_OBJECT_STORAGE:-false}
      - HETZNER_S3_ENDPOINT_URL=${HETZNER_S3_ENDPOINT_URL:-}
      - HETZNER_S3_REGION=${HETZNER_S3_REGION:-}
      - HETZNER_S3_ACCESS_KEY=${HETZNER_S3_ACCESS_KEY:-}
      - HETZNER_S3_SECRET_KEY=${HETZNER_S3_SECRET_KEY:-}
      - HETZNER_MEDIA_BUCKET=${HETZNER_MEDIA_BUCKET:-}
      - HETZNER_MEDIA_URL=${HETZNER_MEDIA_URL:-}
      - HETZNER_MEDIA_CUSTOM_DOMAIN=${HETZNER_MEDIA_CUSTOM_DOMAIN:-}
    volumes:
      - ./patmatch:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    networks:
      - petmatch_network
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
              python manage.py collectstatic --noinput &&
              gunicorn --bind 0.0.0.0:8000 --workers 3 patmatch_backend.wsgi:application"

  worker:
    build:
      context: ./patmatch
      dockerfile: Dockerfile
    container_name: petmatch_worker
    environment:
      - DEBUG=False
      - SECRET_KEY=your-secret-key-here
      - DATABASE_URL=postgresql://petmatch_user:petmatch_password@db:5432/petmatch
      - REDIS_URL=redis://redis:6379
      - NOTIFICATIONS_DELIVERY_MODE=${NOTIFICATIONS_DELIVERY_MODE:-async}
      - NOTIFICATION_EXPERIMENT_PHASE=${NOTIFICATION_EXPERIMENT_PHASE:-10}
      - NOTIFICATION_PUSH_BATCH_SIZE=${NOTIFICATION_PUSH_BATCH_SIZE:-500}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - CELERY_NOTIFICATION_QUEUE=${CELERY_NOTIFICATION_QUEUE:-notifications}
      - CELERY_NOTIFICATION_MAX_ATTEMPTS=${CELERY_NOTIFICATION_MAX_ATTEMPTS:-8}
      - CELERY_NOTIFICATION_RETRY_BASE_SECONDS=${CELERY_NOTIFICATION_RETRY_BASE_SECONDS:-5}
      - CELERY_NOTIFICATION_RETRY_MAX_SECONDS=${CELERY_NOTIFICATION_RETRY_MAX_SECONDS:-900}
      - GOOGLE_MAPS_SERVER_API_KEY=${GOOGLE_MAPS_SERVER_API_KEY:-}
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,petow.app,www.petow.app,api.petow.app
      - CORS_ALLOWED_ORIGINS=https://petow.app,https://www.petow.app,https://api.petow.app
      - USE_HETZNER_OBJECT_STORAGE=${USE_HETZNER_OBJECT_STORAGE:-false}
      - HETZNER_S3_ENDPOINT_URL=${HETZNER_S3_ENDPOINT_URL:-}
      - HETZNER_S3_REGION=${HETZNER_S3_REGION:-}
      - HETZNER_S3_ACCESS_KEY=${HETZNER_S3_ACCESS_KEY:-}
      - HETZNER_S3_SECRET_KEY=${HETZNER_S3_SECRET_KEY:-}
      - HETZNER_MEDIA_BUCKET=${HETZNER_MEDIA_BUCKET:-}
      - HETZNER_MEDIA_URL=${HETZNER_MEDIA_URL:-}
      - HETZNER_MEDIA_CUSTOM_DOMAIN=${HETZNER_MEDIA_CUSTOM_DOMAIN:-}
    volumes:
      - ./patmatch:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      - db
      - redis
    networks:
      - petmatch_network
    restart: unless-stopped
    command: >
      sh -c "celery -A patmatch_backend worker --loglevel=INFO --queues=${CELERY_NOTIFICATION_QUEUE:-notifications}"

  beat:
    build:
      context: ./patmatch
      dockerfile: Dockerfile
    container_name: petmatch_beat
    environment:
      - DEBUG=False
      - SECRET_KEY=your-secret-key-here
      - DATABASE_URL=postgresql://petmatch_user:petmatch_password@db:5432/petmatch
      - REDIS_URL=redis://redis:6379
      - NOTIFICATIONS_DELIVERY_MODE=${NOTIFICATIONS_DELIVERY_MODE:-async}
      - NOTIFICATION_EXPERIMENT_PHASE=${NOTIFICATION_EXPERIMENT_PHASE:-10}
      - NOTIFICATION_PUSH_BATCH_SIZE=${NOTIFICATION_PUSH_BATCH_SIZE:-500}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - CELERY_NOTIFICATION_QUEUE=${CELERY_NOTIFICATION_QUEUE:-notifications}
      - CELERY_NOTIFICATION_MAX_ATTEMPTS=${CELERY_NOTIFICATION_MAX_ATTEMPTS:-8}
      - CELERY_NOTIFICATION_RETRY_BASE_SECONDS=${CELERY_NOTIFICATION_RETRY_BASE_SECONDS:-5}
      - CELERY_NOTIFICATION_RETRY_MAX_SECONDS=${CELERY_NOTIFICATION_RETRY_MAX_SECONDS:-900}
      - GOOGLE_MAPS_SERVER_API_KEY=${GOOGLE_MAPS_SERVER_API_KEY:-}
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,petow.app,www.petow.app,api.petow.app
      - CORS_ALLOWED_ORIGINS=https://petow.app,https://www.petow.app,https://api.petow.app
      - USE_HETZNER_OBJECT_STORAGE=${USE_HETZNER_OBJECT_STORAGE:-false}
      - HETZNER_S3_ENDPOINT_URL=${HETZNER_S3_ENDPOINT_URL:-}
      - HETZNER_S3_REGION=${HETZNER_S3_REGION:-}
      - HETZNER_S3_ACCESS_KEY=${HETZNER_S3_ACCESS_KEY:-}
      - HETZNER_S3_SECRET_KEY=${HETZNER_S3_SECRET_KEY:-}
      - HETZNER_MEDIA_BUCKET=${HETZNER_MEDIA_BUCKET:-}
      - HETZNER_MEDIA_URL=${HETZNER_MEDIA_URL:-}
      - HETZNER_MEDIA_CUSTOM_DOMAIN=${HETZNER_MEDIA_CUSTOM_DOMAIN:-}
    volumes:
      - ./patmatch:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      - db
      - redis
    networks:
      - petmatch_network
    restart: unless-stopped
    command: >
      sh -c "celery -A patmatch_backend beat --loglevel=INFO"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: petmatch_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_files:/var/www/static
      - media_files:/var/www/media
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - backend
    networks:
      - petmatch_network
    restart: unless-stopped
    # Add privileges to bind to port 80
    cap_add:
      - NET_BIND_SERVICE
    user: root

volumes:
  postgres_data:
  static_files:
  media_files:

networks:
  petmatch_network:
    driver: bridge 
